name: Insumos x Orçamento → SharePoint

on:
  # Disparo manual pelo GitHub
  workflow_dispatch:

  # Agendamento automático: todo dia às 20:00 (horário de Brasília = 23:00 UTC)
  schedule:
    - cron: '0 23 * * *'

jobs:
  gerar-e-enviar:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      # 1. Checkout do repositório
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Python
      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. Instalar dependências
      - name: Instalar dependências
        run: pip install -r requirements.txt

      # 4. Criar .env principal (SharePoint)
      - name: Criar .env principal
        run: |
          cat > .env << 'EOF'
          BUILDING_UNIT_IDS_ALLOWED=1
          DEFAULT_END_DATE=2060-12-31
          SHAREPOINT_TENANT_ID=${{ secrets.INSUMOS_SHAREPOINT_TENANT_ID }}
          SHAREPOINT_CLIENT_ID=${{ secrets.INSUMOS_SHAREPOINT_CLIENT_ID }}
          SHAREPOINT_CLIENT_SECRET=${{ secrets.INSUMOS_SHAREPOINT_CLIENT_SECRET }}
          SHAREPOINT_DRIVE_ID=${{ secrets.INSUMOS_SHAREPOINT_DRIVE_ID }}
          SHAREPOINT_PASTA_DESTINO=${{ secrets.INSUMOS_SHAREPOINT_PASTA_DESTINO }}
          SHAREPOINT_ENABLED=true
          EOF

      # 5. Criar .env do siengeAPI
      - name: Criar .env siengeAPI
        run: |
          cat > siengeAPI/.env << 'EOF'
          SIENGE_USER=${{ secrets.INSUMOS_SIENGE_USER }}
          SIENGE_PASSWORD=${{ secrets.INSUMOS_SIENGE_PASSWORD }}
          SIENGE_BASE_URL=${{ secrets.INSUMOS_SIENGE_BASE_URL }}
          EOF

      # 6. Inicializar bases de fornecedores (pedidos, títulos bulk, contratos)
      - name: Inicializar bases
        run: python init_bases.py

      # 7. Executar geração do relatório e upload para SharePoint
      - name: Gerar relatório e enviar para SharePoint
        run: python main.py --export-excel

      # 7. Salvar artefato (disponível por 7 dias no GitHub)
      - name: Salvar artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: insumos-orcamento-${{ github.run_id }}
          path: relatorios/*.xlsx
          retention-days: 7
          if-no-files-found: warn
